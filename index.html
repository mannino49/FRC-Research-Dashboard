<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>FRC — Research and Project Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,300;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* FRC Research Dashboard — dark, warm, academic minimal */

:root {
  --warmth: 0.55;

  --paper:       oklch(calc(0.155 + 0.015 * var(--warmth)) calc(0.004 + 0.010 * var(--warmth)) calc(80 - 180 * (1 - var(--warmth))));
  --paper-2:     oklch(calc(0.195 + 0.015 * var(--warmth)) calc(0.005 + 0.012 * var(--warmth)) calc(80 - 180 * (1 - var(--warmth))));
  --paper-3:     oklch(calc(0.235 + 0.015 * var(--warmth)) calc(0.006 + 0.014 * var(--warmth)) calc(80 - 180 * (1 - var(--warmth))));

  --ink:         oklch(calc(0.94 - 0.01 * (1 - var(--warmth))) calc(0.006 + 0.010 * var(--warmth)) 80);
  --ink-2:       oklch(0.78 calc(0.005 + 0.008 * var(--warmth)) 80);
  --ink-3:       oklch(0.58 calc(0.004 + 0.006 * var(--warmth)) 80);
  --ink-4:       oklch(0.42 calc(0.003 + 0.005 * var(--warmth)) 80);

  --rule:        oklch(0.32 0.004 80 / 0.9);
  --rule-soft:   oklch(0.32 0.004 80 / 0.5);

  --accent:      oklch(0.82 0.11 78);
  --accent-dim:  oklch(0.70 0.09 78);

  --status-drafting: var(--ink-2);
  --status-review:   oklch(0.80 0.06 220);
  --status-waiting:  oklch(0.78 0.08 50);
  --status-submitted:oklch(0.80 0.07 150);
  --status-idea:     var(--ink-3);

  --serif: "Newsreader", "Iowan Old Style", "Charter", Georgia, serif;
  --mono:  "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;

  --fs-micro: 11px;
  --fs-sm:    13px;
  --fs-body:  15px;
  --fs-lg:    18px;
  --fs-xl:    22px;
  --fs-2xl:   30px;
  --fs-3xl:   42px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--serif);
  font-size: var(--fs-body);
  line-height: 1.5;
  color: var(--ink);
  background: var(--paper);
  font-feature-settings: "onum" 1, "kern" 1, "liga" 1;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
}

::selection { background: var(--accent); color: var(--paper); }

button, input, textarea, select {
  font: inherit;
  color: inherit;
  background: transparent;
  border: none;
  outline: none;
}
button { cursor: pointer; padding: 0; }

a { color: inherit; text-decoration: none; }

.mono {
  font-family: var(--mono);
  font-feature-settings: "tnum" 1, "zero" 1;
  letter-spacing: 0;
}
.sc {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
}
.italic { font-style: italic; }
.tabular { font-variant-numeric: tabular-nums lining-nums; }
.old { font-variant-numeric: oldstyle-nums proportional-nums; }

.rule { border: 0; border-top: 1px solid var(--rule); margin: 0; }
.rule-soft { border: 0; border-top: 1px solid var(--rule-soft); margin: 0; }

/* ---------- layout ---------- */

.app {
  max-width: 1180px;
  margin: 0 auto;
  padding: 48px 72px 120px;
}

.masthead {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 32px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--rule);
}
.masthead h1 {
  font-weight: 400;
  font-size: var(--fs-3xl);
  margin: 0;
  letter-spacing: -0.01em;
  line-height: 1;
}
.masthead h1 .amp { font-style: italic; color: var(--ink-3); font-weight: 300; }
.masthead .dateline {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
  margin-top: 12px;
}
.masthead .issue {
  text-align: right;
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
  line-height: 1.7;
}
.masthead .issue strong { color: var(--ink); font-weight: 500; }

/* Primary nav */
.nav {
  display: flex;
  gap: 28px;
  padding: 18px 0 14px;
  border-bottom: 1px solid var(--rule);
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
}
.nav a {
  color: var(--ink-3);
  padding-bottom: 4px;
  border-bottom: 1px solid transparent;
  cursor: pointer;
  transition: color .08s linear;
}
.nav a:hover { color: var(--ink); }
.nav a.active { color: var(--ink); border-bottom-color: var(--ink); }
.nav .spacer { flex: 1; }
.nav .kbd {
  color: var(--ink-3);
  text-transform: none;
  letter-spacing: 0;
}
.nav .kbd kbd {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  border: 1px solid var(--rule);
  padding: 1px 5px;
  color: var(--ink-2);
  background: var(--paper-2);
}

/* ---------- summary strip ---------- */
.summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding: 28px 0 28px;
  border-bottom: 1px solid var(--rule);
  gap: 24px;
}
.summary .cell { border-left: 1px solid var(--rule-soft); padding-left: 20px; }
.summary .cell:first-child { border-left: 0; padding-left: 0; }
.summary .n {
  font-size: var(--fs-3xl);
  font-weight: 300;
  line-height: 1;
  font-variant-numeric: oldstyle-nums;
  letter-spacing: -0.01em;
}
.summary .n small { font-size: 0.55em; color: var(--ink-3); margin-left: 6px; font-style: italic; font-weight: 400; }
.summary .lbl {
  margin-top: 10px;
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
}
.summary .sub {
  color: var(--ink);
  font-size: var(--fs-body);
  margin-top: 6px;
  font-style: italic;
}

/* ---------- filters / grouping bar ---------- */
.bar {
  display: flex;
  align-items: baseline;
  gap: 22px;
  padding: 22px 0 10px;
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
}
.bar .chip {
  color: var(--ink-3);
  cursor: pointer;
  padding-bottom: 3px;
  border-bottom: 1px solid transparent;
}
.bar .chip:hover { color: var(--ink); }
.bar .chip.on { color: var(--ink); border-bottom-color: var(--ink); }
.bar .sep { color: var(--ink-4); }
.bar .right { margin-left: auto; display: flex; gap: 18px; align-items: baseline; }

/* ---------- project list ---------- */
.section-head {
  display: grid;
  grid-template-columns: 60px 1fr auto;
  align-items: baseline;
  gap: 16px;
  padding: 28px 0 10px;
  border-bottom: 1px solid var(--rule);
}
.section-head .numeral {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  color: var(--ink-3);
  font-size: var(--fs-2xl);
  line-height: 1;
}
.section-head .title {
  font-size: var(--fs-lg);
  font-weight: 400;
  letter-spacing: -0.005em;
}
.section-head .count {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
}

.row {
  display: grid;
  grid-template-columns: 60px 32px 1fr 180px 110px 90px;
  align-items: baseline;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  position: relative;
  transition: background .1s linear;
}
.row:hover { background: var(--paper-2); }
.row.sel { background: var(--paper-2); }

.row .idx {
  font-family: var(--serif);
  font-style: italic;
  color: var(--ink-4);
  font-size: var(--fs-sm);
  text-align: right;
  padding-right: 4px;
  font-variant-numeric: oldstyle-nums;
}

.row .turn {
  font-family: var(--serif);
  font-style: italic;
  font-size: var(--fs-lg);
  line-height: 1;
  color: var(--ink-3);
  white-space: nowrap;
}
.row .turn .arrow { color: var(--ink-4); margin-right: 2px; }
.row .turn .who { font-style: normal; letter-spacing: 0.01em; }
.row.mine .turn,
.row.mine .turn .arrow,
.row.mine .turn .who { color: var(--accent); }

.row .title-cell {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}
.row .title-cell .t {
  font-size: var(--fs-body);
  line-height: 1.35;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.row .title-cell .meta {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
  display: flex;
  gap: 10px;
  align-items: baseline;
}
.row .title-cell .meta .dot { color: var(--ink-4); }
.row .title-cell .meta .co { font-style: italic; text-transform: none; letter-spacing: 0; font-family: var(--serif); color: var(--ink-3); }

.row .venue {
  color: var(--ink-2);
  font-style: italic;
  font-size: var(--fs-sm);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.row .status {
  font-family: var(--mono);
  font-size: var(--fs-sm);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink);
  cursor: pointer;
  position: relative;
}
.row .status:hover { color: var(--ink); }
.row .status .tick { color: var(--ink-3); margin-right: 6px; }

.row .date {
  font-family: var(--mono);
  font-size: var(--fs-sm);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--ink-2);
  text-align: right;
}

.row .reveal {
  opacity: 0;
  transition: opacity .1s linear;
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-4);
}
.row:hover .reveal { opacity: 1; }

/* ---------- inline dropdown ---------- */
.menu {
  position: absolute;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  z-index: 40;
  min-width: 180px;
  padding: 4px 0;
}
.menu button {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 14px;
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-2);
}
.menu button:hover { background: var(--paper-3); color: var(--ink); }
.menu button.on { color: var(--accent); }

/* ---------- slide-over detail ---------- */
.scrim {
  position: fixed; inset: 0;
  background: oklch(0.08 0 0 / 0.55);
  z-index: 50;
  animation: fade .12s linear;
}
@keyframes fade { from { opacity: 0 } to { opacity: 1 } }
.slide {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: min(720px, 90vw);
  background: var(--paper);
  border-left: 1px solid var(--rule);
  z-index: 51;
  overflow-y: auto;
  animation: slidein .16s cubic-bezier(.2,.8,.2,1);
}
@keyframes slidein { from { transform: translateX(24px); opacity: 0 } to { transform: none; opacity: 1 } }
.slide .inner { padding: 44px 56px 80px; }
.slide .topbar {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--rule);
}
.slide .topbar .label {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
}
.slide .topbar .close { color: var(--ink-3); cursor: pointer; }
.slide .topbar .close:hover { color: var(--ink); }

.slide h2 {
  font-weight: 400;
  font-size: var(--fs-2xl);
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin: 28px 0 8px;
}
.slide .byline {
  font-style: italic;
  color: var(--ink-2);
  font-size: var(--fs-body);
}

.slide .facts {
  margin-top: 32px;
  display: grid;
  grid-template-columns: 140px 1fr;
  row-gap: 10px;
  column-gap: 24px;
  padding: 20px 0;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.slide .facts dt {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
  padding-top: 3px;
}
.slide .facts dd {
  margin: 0;
  color: var(--ink);
}
.slide .facts .clickable {
  cursor: pointer;
  border-bottom: 1px dashed var(--rule);
  display: inline-block;
  padding-bottom: 1px;
}
.slide .facts .clickable:hover { border-bottom-color: var(--ink); }

.slide .note {
  margin-top: 28px;
  padding: 20px 0;
  border-bottom: 1px solid var(--rule);
}
.slide .note .lbl {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
  margin-bottom: 8px;
}
.slide .note p { margin: 0; color: var(--ink); font-size: var(--fs-lg); line-height: 1.45; }

.slide .addnote {
  margin-top: 22px;
}
.slide .addnote textarea {
  width: 100%;
  min-height: 72px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  padding: 12px 14px;
  color: var(--ink);
  font-size: var(--fs-body);
  font-family: var(--serif);
  resize: vertical;
}
.slide .addnote textarea:focus { border-color: var(--ink-3); }
.slide .addnote .actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}
.slide .addnote .hand {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
  display: flex; gap: 14px; align-items: baseline;
}
.slide .addnote .hand .pick { color: var(--ink-2); cursor: pointer; border-bottom: 1px dashed var(--rule); }
.slide .addnote .hand .pick.on { color: var(--accent); border-color: var(--accent); }
.slide .addnote button.post {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink);
  border: 1px solid var(--rule);
  padding: 6px 14px;
  background: var(--paper-2);
}
.slide .addnote button.post:hover { background: var(--paper-3); }

.slide .history { margin-top: 32px; }
.slide .history .lbl {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
  margin-bottom: 12px;
}
.slide .history .entry {
  display: grid;
  grid-template-columns: 100px 30px 1fr;
  gap: 12px;
  padding: 12px 0;
  border-top: 1px solid var(--rule-soft);
}
.slide .history .entry .d {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-3);
  padding-top: 3px;
}
.slide .history .entry .who { font-style: italic; color: var(--ink-2); }
.slide .history .entry .t { color: var(--ink); }

.slide .links {
  display: flex; flex-wrap: wrap; gap: 8px 18px;
  margin-top: 6px;
}
.slide .links a {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-2);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 2px;
  cursor: pointer;
}
.slide .links a:hover { color: var(--ink); border-color: var(--ink-2); }

/* ---------- command palette ---------- */
.palette-scrim {
  position: fixed; inset: 0;
  background: oklch(0.08 0 0 / 0.5);
  z-index: 80;
  display: flex;
  justify-content: center;
  padding-top: 14vh;
  animation: fade .1s linear;
}
.palette {
  width: min(640px, 90vw);
  background: var(--paper);
  border: 1px solid var(--rule);
  max-height: 60vh;
  display: flex;
  flex-direction: column;
}
.palette .pin {
  display: flex; align-items: baseline; gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--rule);
}
.palette .pin .pfx {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
}
.palette .pin input {
  flex: 1;
  font-size: var(--fs-lg);
  color: var(--ink);
}
.palette .list { overflow-y: auto; padding: 6px 0; }
.palette .item {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  gap: 12px;
  align-items: baseline;
  padding: 10px 18px;
  cursor: pointer;
}
.palette .item .kind {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-4);
}
.palette .item .label { color: var(--ink); }
.palette .item .label em { font-style: italic; color: var(--ink-3); }
.palette .item .hint {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-4);
}
.palette .item.act { background: var(--paper-2); }
.palette .item.act .label { color: var(--ink); }
.palette .item.act .kind { color: var(--accent); }

.palette .foot {
  border-top: 1px solid var(--rule);
  padding: 8px 18px;
  display: flex; gap: 18px;
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-4);
}
.palette .foot kbd {
  font-family: var(--mono);
  border: 1px solid var(--rule);
  padding: 1px 5px;
  color: var(--ink-2);
}

/* ---------- tweaks ---------- */
.tweaks-fab {
  position: fixed;
  right: 24px;
  bottom: 24px;
  display: none;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  padding: 16px 18px;
  z-index: 70;
  width: 280px;
}
.tweaks-fab.on { display: block; }
.tweaks-fab .h {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
  margin-bottom: 12px;
}
.tweaks-fab label {
  display: block;
  margin: 12px 0 4px;
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-3);
}
.tweaks-fab input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 1px;
  background: var(--rule);
}
.tweaks-fab input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 10px;
  background: var(--ink);
  border-radius: 50%;
  cursor: pointer;
}
.tweaks-fab input[type="range"]::-moz-range-thumb {
  width: 10px; height: 10px;
  background: var(--ink); border: 0;
  border-radius: 50%; cursor: pointer;
}
.tweaks-fab .opts {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  margin-top: 4px;
}
.tweaks-fab .opts button {
  font-family: var(--mono);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  padding: 6px 0;
  border: 1px solid var(--rule);
  color: var(--ink-2);
  background: var(--paper);
}
.tweaks-fab .opts button.on { color: var(--ink); border-color: var(--ink-2); }
.tweaks-fab .warmth-scale {
  display: flex; justify-content: space-between;
  font-family: var(--mono);
  font-size: var(--fs-micro);
  color: var(--ink-4);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  margin-top: 4px;
}

/* ---------- new project form ---------- */
.form-wrap {
  max-width: 760px;
  padding-top: 32px;
}
.form-wrap h2 {
  font-size: var(--fs-2xl);
  font-weight: 400;
  margin: 0 0 6px;
  letter-spacing: -0.01em;
}
.form-wrap .sub {
  color: var(--ink-2);
  font-style: italic;
  margin-bottom: 32px;
}
.form-wrap .field {
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 24px;

function classNames(...xs) { return xs.filter(Boolean).join(' '); }

function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return `${m} ${String(d.getDate()).padStart(2, '0')}`;
}

function daysAgo(iso) {
  const d = new Date(iso + 'T00:00:00');
  const now = new Date();
  const diff = Math.round((now - d) / 86400000);
  if (diff <= 0) return 'today';
  if (diff === 1) return 'yesterday';
  if (diff < 7) return `${diff}d ago`;
  if (diff < 30) return `${Math.round(diff/7)}w ago`;
  return `${Math.round(diff/30)}mo ago`;
}

function turnLabel(turnId) {
  const p = personById(turnId);
  if (!p) return turnId;
  return p.kind === 'internal' ? p.initials : `${p.initials}·ext`;

}

function typeWord(type) {
  return { paper: 'Paper', collaboration: 'Collab.', applied: 'Applied', idea: 'Idea' }[type] || type;
}

<script type="text/babel">
// ── Command Palette ────────────────────────────────────────────────────────────

function Palette({ open, onClose, projects, onGoto, onOpen }) {
  const [q, setQ] = React.useState('');
  const [cur, setCur] = React.useState(0);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (open) {
      setQ('');
      setCur(0);
      setTimeout(() => inputRef.current && inputRef.current.focus(), 10);
    }
  }, [open]);

  const items = React.useMemo(() => {
    const all = [];
    const navs = [
      { kind: 'nav', label: 'Home',          to: 'home',   hint: 'g h' },
      { kind: 'nav', label: 'New project',   to: 'new',    hint: 'g n' },
      { kind: 'nav', label: 'Collaborators', to: 'people', hint: 'g c' },
    ];
    for (const n of navs) all.push(n);
    for (const p of projects) {
      all.push({ kind: 'project', label: p.title, venue: p.venue, id: p.id, turn: p.turn });
    }
    const needle = q.trim().toLowerCase();
    if (!needle) return all;
    return all.filter(i => (i.label + (i.venue || '')).toLowerCase().includes(needle));
  }, [q, projects]);

  React.useEffect(() => { setCur(0); }, [q]);

  function handleKey(e) {
    if (e.key === 'ArrowDown') { e.preventDefault(); setCur(c => Math.min(c + 1, items.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setCur(c => Math.max(c - 1, 0)); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      const it = items[cur]; if (!it) return;
      if (it.kind === 'nav') onGoto(it.to);
      else if (it.kind === 'project') onOpen(it.id);
      onClose();
    } else if (e.key === 'Escape') onClose();
  }

  if (!open) return null;

  return (
    <div className="palette-scrim" onMouseDown={onClose}>
      <div className="palette" onMouseDown={e => e.stopPropagation()}>
        <div className="pin">
          <span className="pfx">⌘K</span>
          <input
            ref={inputRef}
            value={q}
            onChange={e => setQ(e.target.value)}
            onKeyDown={handleKey}
            placeholder="jump to project, page, or action…"
          />
        </div>
        <div className="list">
          {items.length === 0 && (
            <div style={{padding: '20px 18px', color: 'var(--ink-3)', fontStyle: 'italic'}}>
              Nothing matches.
            </div>
          )}
          {items.map((it, i) => (
            <div
              key={it.kind + '-' + (it.id || it.to) + '-' + i}
              className={classNames('item', i === cur && 'act')}
              onMouseEnter={() => setCur(i)}
              onClick={() => {
                if (it.kind === 'nav') onGoto(it.to);
                else onOpen(it.id);
                onClose();
              }}
            >
              <span className="kind">{it.kind === 'nav' ? '→' : '¶'}</span>
              <span className="label">
                {it.label}
                {it.venue ? <em> — {it.venue}</em> : null}
              </span>
              <span className="hint">
                {it.hint || (it.kind === 'project' ? `turn · ${turnLabel(it.turn)}` : '')}
              </span>
            </div>
          ))}
        </div>
        <div className="foot">
          <span><kbd>↑↓</kbd> navigate</span>
          <span><kbd>↵</kbd> open</span>
          <span><kbd>esc</kbd> close</span>
        </div>
      </div>
    </div>
  );
}

            )}

function Home({ projects, onOpen, grouping, onPatch, onHistory }) {
  const [openMenu, setOpenMenu] = React.useState(null);

  const sorted = React.useMemo(() => {
    const me = 'MM';
    return [...projects].sort((a, b) => {
      const aMine = a.turn === me ? 0 : (a.turn === 'SK' ? 1 : 2);
      const bMine = b.turn === me ? 0 : (b.turn === 'SK' ? 1 : 2);
      if (aMine !== bMine) return aMine - bMine;
      return b.updated.localeCompare(a.updated);
    });
  }, [projects]);

  const groups = React.useMemo(() => {
    if (grouping === 'flat') {
      return [{ key: 'all', title: 'All projects', items: sorted, numeral: 'I' }];
    }
    if (grouping === 'turn') {
      const buckets = { mine: [], partner: [], external: [] };
      for (const p of sorted) {
        if (p.turn === 'MM') buckets.mine.push(p);
        else if (p.turn === 'SK') buckets.partner.push(p);
        else buckets.external.push(p);
      }
      return [
        { key: 'mine',     title: 'Your turn',                  items: buckets.mine,     numeral: 'I' },
        { key: 'partner',  title: 'Steven\u2019s turn',          items: buckets.partner,  numeral: 'II' },
        { key: 'external', title: 'Waiting on collaborators',    items: buckets.external, numeral: 'III' },
      ].filter(g => g.items.length > 0);
    }
    if (grouping === 'status') {
      const order = ['Drafting', 'In review', 'Waiting', 'Submitted', 'Idea'];
      const numerals = ['I','II','III','IV','V'];
      return order.map((s, i) => ({
        key: s, title: s, items: sorted.filter(p => p.status === s), numeral: numerals[i]
      })).filter(g => g.items.length > 0);
    }
    if (grouping === 'type') {
      const labels = { paper: 'Papers', collaboration: 'Collaborations', applied: 'Applied projects' };
      const numerals = { paper: 'I', collaboration: 'II', applied: 'III' };
      return ['paper','collaboration','applied']
        .map(t => ({ key: t, title: labels[t], items: sorted.filter(p => p.type === t), numeral: numerals[t] }))
        .filter(g => g.items.length > 0);
    }
    return [];
  }, [sorted, grouping]);

  React.useEffect(() => {
    function onDoc() { setOpenMenu(null); }
    document.addEventListener('click', onDoc);
    return () => document.removeEventListener('click', onDoc);
  }, []);

  const mineCount    = projects.filter(p => p.turn === 'MM').length;
  const partnerCount = projects.filter(p => p.turn === 'SK').length;
  const extCount     = projects.filter(p => personById(p.turn)?.kind === 'external').length;
  const inReview     = projects.filter(p => p.status === 'In review').length;

  let runningIdx = 0;

  return (
    <>
      <section className="summary">
        <div className="cell">
          <div className="n old" style={{color: 'var(--accent)'}}>{mineCount}</div>
          <div className="lbl">Your turn</div>
          <div className="sub">to move these forward</div>
        </div>
        <div className="cell">
          <div className="n old">{partnerCount}</div>
          <div className="lbl">Steven&rsquo;s turn</div>
          <div className="sub">with Steven</div>
        </div>
        <div className="cell">
          <div className="n old">{extCount}</div>
          <div className="lbl">External</div>
          <div className="sub">waiting on co-authors</div>
        </div>
        <div className="cell">
          <div className="n old">{inReview}<small>in review</small></div>
          <div className="lbl">Active, total · {projects.length}</div>
          <div className="sub">across papers, collabs, applied</div>
        </div>
      </section>

      {groups.map(g => (
        <section key={g.key}>
          <div className="section-head">
            <span className="numeral">{g.numeral}.</span>
            <span className="title">{g.title}</span>
            <span className="count">{g.items.length} {g.items.length === 1 ? 'project' : 'projects'}</span>
          </div>
          <div className="list">
            {g.items.map(p => {
              runningIdx += 1;
              const mine = p.turn === 'MM';
              const turnPerson = personById(p.turn);
              return (
                <div
                  key={p.id}
                  className={classNames('row', mine && 'mine')}
                  onClick={() => onOpen(p.id)}
                >
                  <span className="idx">{runningIdx}</span>
                  <span className="turn" onClick={(e) => {
                    e.stopPropagation();
                    setOpenMenu(openMenu && openMenu.projectId === p.id && openMenu.kind === 'turn'
                      ? null : { projectId: p.id, kind: 'turn' });
                  }}>
                    <span className="arrow">→</span>
                    <span className="who mono">{turnPerson ? turnPerson.initials : p.turn}</span>
                    {openMenu && openMenu.projectId === p.id && openMenu.kind === 'turn' && (
                      <div className="menu" style={{top: 28, left: 0}} onClick={e => e.stopPropagation()}>
                        {['MM','SK', ...p.coauthors].map(id => (
                          <button key={id}
                            className={p.turn === id ? 'on' : ''}
                            onClick={() => {
                              onPatch(p.id, { turn: id, updated: new Date().toISOString().slice(0,10) });
                              onHistory(p.id, { d: new Date().toISOString().slice(0,10), who: 'MM', t: `Passed turn to ${personById(id)?.name || id}.`});
                              setOpenMenu(null);
                            }}
                          >{personById(id)?.name || id}</button>
                        ))}
                      </div>
                    )}
                  </span>
                  <span className="title-cell">
                    <span className="t">{p.title}</span>
                    <span className="meta">
                      <span>{typeMark(p.type)} {typeWord(p.type)}</span>
                      {p.coauthors.filter(id => personById(id)?.kind === 'external').length > 0 && (
                        <>
                          <span className="dot">·</span>
                          <span className="co">with {p.coauthors.filter(id => personById(id)?.kind === 'external').map(id => personById(id)?.name.split(' ').slice(-1)[0]).join(', ')}</span>
                        </>
                      )}
                      {p.waitingOn && (
                        <>
                          <span className="dot">·</span>
                          <span className="co" style={{color: 'var(--status-waiting)'}}>waiting on {personById(p.waitingOn)?.name.split(' ').slice(-1)[0]}</span>
                        </>
                      )}
                    </span>
                  </span>
                  <span className="venue">{p.venue}</span>
                  <span className="status" onClick={(e) => {
                    e.stopPropagation();
                    setOpenMenu(openMenu && openMenu.projectId === p.id && openMenu.kind === 'status'
                      ? null : { projectId: p.id, kind: 'status' });
                  }}>
                    <span className="tick">—</span>{p.status}
                    {openMenu && openMenu.projectId === p.id && openMenu.kind === 'status' && (
                      <div className="menu" style={{top: 24, left: 0}} onClick={e => e.stopPropagation()}>
                        {STATUSES.map(s => (
                          <button key={s}
                            className={p.status === s ? 'on' : ''}
                            onClick={() => { onPatch(p.id, { status: s }); setOpenMenu(null); }}
                          >{s}</button>
                        ))}
                      </div>
                    )}
                  </span>
                  <span className="date">{daysAgo(p.updated)}</span>
                </div>
              );
            })}
          </div>
        </section>
      ))}
    </>
  );
}

function NewProject({ onCreate, onCancel }) {
  const [title,     setTitle]     = React.useState('');
  const [type,      setType]      = React.useState('paper');
  const [turn,      setTurn]      = React.useState('MM');
  const [venue,     setVenue]     = React.useState('');
  const [note,      setNote]      = React.useState('');
  const [coauthors, setCoauthors] = React.useState([]);

  const externals = Object.entries(window.PEOPLE).filter(([, p]) => p.kind === 'external');

  function toggle(id) {
    setCoauthors(c => c.includes(id) ? c.filter(x => x !== id) : [...c, id]);
  }

  function submit() {
    if (!title.trim()) return;
    const today = new Date().toISOString().slice(0,10);
    onCreate({
      id: 'p' + Math.floor(Math.random() * 10000),
      title: title.trim(),
      type, turn,
      venue: venue.trim() || 'unplaced',
      updated: today,
      status: 'Idea',
      note: note.trim(),
      waitingOn: null,
      coauthors,
      links: [],
      history: [{ d: today, who: 'MM', t: 'Project created.' }],
    });
  }

  // esc to cancel
  React.useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onCancel(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onCancel]);

  return (
    <div className="form-wrap">
      <h2>A new project</h2>
      <div className="sub">Seed it lightly. The rest can wait.</div>

      <div className="field">
        <label>Title</label>
        <input type="text" value={title} onChange={e => setTitle(e.target.value)}
          placeholder="Working title — the one-line description you'd use in a hallway." autoFocus />
      </div>

      <div className="field">
        <label>Type</label>
        <div className="pillrow">
          {TYPES.map(t => (
            <button key={t} className={type === t ? 'on' : ''} onClick={() => setType(t)}>
              {typeMark(t)} {typeWord(t)}
            </button>
          ))}
        </div>
      </div>

      <div className="field">
        <label>Whose turn</label>
        <div className="pillrow">
          <button className={turn === 'MM' ? 'on' : ''} onClick={() => setTurn('MM')}>MM · Michael</button>
          <button className={turn === 'SK' ? 'on' : ''} onClick={() => setTurn('SK')}>SK · Steven</button>
        </div>
      </div>

      <div className="field">
        <label>Venue</label>
        <input type="text" value={venue} onChange={e => setVenue(e.target.value)}
          placeholder="Neuroscience of Consciousness · n+1 · Asterisk · unplaced" />
      </div>

      <div className="field">
        <label>External co-authors</label>
        <div className="pillrow">
          {externals.map(([id, p]) => (

              {p.name}

          ))}

      <div className="field">
        <label>Next action</label>
        <textarea value={note} onChange={e => setNote(e.target.value)}
          placeholder="The first concrete move. A sentence is enough." />
      </div>

      <div className="submitrow">
        <button className="primary" onClick={submit}>Create project</button>
        <span className="ghost" style={{cursor: 'pointer'}} onClick={onCancel}>or cancel (esc)</span>
      </div>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────

const PROJECTS_CACHE_KEY = 'frc.v1.projects';
const API_URL = '/api/projects';

function App() {
  const [warmth,    setWarmth]    = React.useState(0.55);
  const [grouping,  setGrouping]  = React.useState(() => localStorage.getItem('frc.grouping') || 'turn');
  const [page,      setPage]      = React.useState(() => localStorage.getItem('frc.page') || 'home');
  const [selectedId, setSelectedId] = React.useState(null);
  const [paletteOpen, setPaletteOpen] = React.useState(false);

  // Projects: hydrate from localStorage synchronously so first render is never empty.
  // The API then replaces it on mount if a server copy exists.
  const [projects, setProjects] = React.useState(() => {
    try {
      const cached = localStorage.getItem(PROJECTS_CACHE_KEY);
      if (cached) return JSON.parse(cached);
    } catch (e) { /* fall through */ }
    return window.PROJECTS;
  });

  // sync state: 'loading' | 'synced' | 'saving' | 'offline'
  const [syncState, setSyncState] = React.useState('loading');
  const [toast,     setToast]     = React.useState(null);
  const [tweaksOn,  setTweaksOn]  = React.useState(false);

  // Refs for save pipeline
  const hasLoadedRef = React.useRef(false);
  const saveTimerRef = React.useRef(null);

  // Initial load: pull authoritative copy from the API.
  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('bad status ' + res.status);
        const data = await res.json();
        if (cancelled) return;
        if (Array.isArray(data) && data.length > 0) setProjects(data);
        setSyncState('synced');
      } catch (e) {
        if (cancelled) return;
        // API unreachable — keep whatever we hydrated from cache/seed.
        setSyncState('offline');
      } finally {
        if (!cancelled) hasLoadedRef.current = true;
      }
    })();
    return () => { cancelled = true; };
  }, []);

  // Save on any change: cache locally immediately, PUT to API debounced.
  React.useEffect(() => {
    if (!hasLoadedRef.current) return;
    try { localStorage.setItem(PROJECTS_CACHE_KEY, JSON.stringify(projects)); } catch (e) {}
    clearTimeout(saveTimerRef.current);
    setSyncState('saving');
    saveTimerRef.current = setTimeout(async () => {
      try {
        const res = await fetch(API_URL, {
          method: 'PUT',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(projects),
        });
        setSyncState(res.ok ? 'synced' : 'offline');
      } catch (e) {
        setSyncState('offline');
      }
    }, 500);
    return () => clearTimeout(saveTimerRef.current);
  }, [projects]);

  // Apply warmth to :root
  React.useEffect(() => {
    document.documentElement.style.setProperty('--warmth', String(warmth));
  }, [warmth]);

  // Persist page + grouping
  React.useEffect(() => { localStorage.setItem('frc.page', page); }, [page]);
  React.useEffect(() => { localStorage.setItem('frc.grouping', grouping); }, [grouping]);

  // Edit-mode protocol (Claude Design interop)
  React.useEffect(() => {
    function onMsg(e) {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode')   setTweaksOn(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOn(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Global keyboard shortcuts
  React.useEffect(() => {
    function onKey(e) {
      const meta = e.metaKey || e.ctrlKey;
      if (meta && e.key.toLowerCase() === 'k') {
        e.preventDefault(); setPaletteOpen(v => !v); return;
      }
      if (paletteOpen) return;
      const tag = (e.target && e.target.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      if (e.key === 'Escape') { setSelectedId(null); return; }
      if (e.key === 'g') {
        const handler = (ev) => {
          if (ev.key === 'h') setPage('home');
          else if (ev.key === 'n') { setPage('new'); setSelectedId(null); }
          else if (ev.key === 'c') { setPage('people'); setSelectedId(null); }
          window.removeEventListener('keydown', handler);
        };
        window.addEventListener('keydown', handler);
        setTimeout(() => window.removeEventListener('keydown', handler), 800);
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [paletteOpen]);

  function patchProject(id, patch) {
    setProjects(ps => ps.map(p => p.id === id ? { ...p, ...patch } : p));
    flashToast('Updated');
  }

  function appendHistory(id, entry) {
    setProjects(ps => ps.map(p => p.id === id ? { ...p, history: [entry, ...p.history] } : p));
  }

  function createProject(p) {
    setProjects(ps => [p, ...ps]);
    setPage('home');
    setSelectedId(p.id);
    flashToast('Project created');
  }

  function deleteProject(id) {
    setProjects(ps => ps.filter(p => p.id !== id));
    setSelectedId(null);
    flashToast('Project deleted');
  }

  function flashToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 1400);
  }

  const selected = projects.find(p => p.id === selectedId);

  const todayStr = new Date().toLocaleDateString(undefined, {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });

  return (
    <div className="app">
      <header className="masthead">
        <div>
          <h1>Research <span className="amp">and</span> Project Dashboard</h1>
          <div className="dateline">Friday · {todayStr} · Vol. III No. XVII</div>
        </div>
        <div className="issue">
          <div><strong>Mannino</strong> &amp; <strong>Kotler</strong></div>
          <div>two admins · equal standing</div>
          <div>est. 2024</div>
          <div style={{
            marginTop: 8,
            color: syncState === 'offline' ? 'var(--status-waiting)' :
                   syncState === 'synced'  ? 'var(--ink-4)' :
                   'var(--ink-3)',
          }}>
            {syncState === 'loading' ? '· loading' :
             syncState === 'saving'  ? '· saving' :
             syncState === 'offline' ? '⚠ offline · local only' :
             '· synced'}
          </div>
        </div>
      </header>

      <nav className="nav">
        <a className={page === 'home'   ? 'active' : ''} onClick={() => { setPage('home');   setSelectedId(null); }}>Projects</a>
        <a className={page === 'people' ? 'active' : ''} onClick={() => { setPage('people'); setSelectedId(null); }}>Collaborators</a>
        <a className={page === 'new'    ? 'active' : ''} onClick={() => { setPage('new');    setSelectedId(null); }}>New project</a>
        <span className="spacer" />
        <span className="kbd">press <kbd>⌘K</kbd> to jump · <kbd>g h</kbd> home · <kbd>g n</kbd> new · <kbd>g c</kbd> co-authors</span>
      </nav>

      {page === 'home' && (
        <>
          <div className="bar">
            <span style={{color: 'var(--ink)'}}>Group</span>
            <span className={classNames('chip', grouping === 'turn'   && 'on')} onClick={() => setGrouping('turn')}>by turn</span>
            <span className="sep">·</span>
            <span className={classNames('chip', grouping === 'status' && 'on')} onClick={() => setGrouping('status')}>by status</span>
            <span className="sep">·</span>
            <span className={classNames('chip', grouping === 'type'   && 'on')} onClick={() => setGrouping('type')}>by type</span>
            <span className="sep">·</span>
            <span className={classNames('chip', grouping === 'flat'   && 'on')} onClick={() => setGrouping('flat')}>flat</span>
            <span className="right">
              <span>{projects.length} active · as of today</span>
            </span>
          </div>
          <Home
            projects={projects}
            onOpen={setSelectedId}
            grouping={grouping}
            onPatch={patchProject}
            onHistory={appendHistory}
          />
        </>
      )}

      {page === 'people' && <People projects={projects} onOpenProject={(id) => { setSelectedId(id); setPage('home'); }} />}
      {page === 'new'    && <NewProject onCreate={createProject} onCancel={() => setPage('home')} />}

      {selected && (
        <Detail
          project={selected}
          onClose={() => setSelectedId(null)}
          onPatch={patchProject}
          onHistory={appendHistory}
          onDelete={deleteProject}
        />
      )}

      <Palette
        open={paletteOpen}
        onClose={() => setPaletteOpen(false)}
        projects={projects}
        onGoto={(p) => { setPage(p); setSelectedId(null); }}
        onOpen={(id) => setSelectedId(id)}
      />

      <div className={classNames('tweaks-fab', tweaksOn && 'on')}>
        <div className="h">Tweaks</div>
        <label>Paper warmth</label>
        <input type="range" min="0" max="1" step="0.01" value={warmth}
          onChange={e => setWarmth(parseFloat(e.target.value))} />
        <div className="warmth-scale"><span>cool</span><span>warm</span></div>
        <label style={{marginTop: 18}}>Home grouping</label>
        <div className="opts">
          {[['turn','by turn'],['status','by status'],['type','by type'],['flat','flat']].map(([v, l]) => (
            <button key={v} className={grouping === v ? 'on' : ''}
              onClick={() => setGrouping(v)}>{l}</button>
          ))}
        </div>
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
